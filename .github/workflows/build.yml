name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev openjdk-17-jdk zip unzip
          pip install --upgrade pip
          pip install cython
          pip install git+https://github.com/kivy/buildozer.git
      - name: Build APK
        run: yes | buildozer android debug 2>&1 | tee build.log || true
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: bin/
